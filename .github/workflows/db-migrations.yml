name: DB Migrations

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrations.yml"
  workflow_dispatch:

jobs:
  push-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        id: validate
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping DB migration push because one or more required secrets are missing."
            exit 0
          fi
          if [[ "$SUPABASE_ACCESS_TOKEN" != sbp_* ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping DB migration push because SUPABASE_ACCESS_TOKEN must use the sbp_ format."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.validate.outputs.ready == 'true'
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        if: steps.validate.outputs.ready == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: 2.51.0

      - name: Link project
        if: steps.validate.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations
        if: steps.validate.outputs.ready == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --linked --include-all --yes
