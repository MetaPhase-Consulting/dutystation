name: DB Migrations

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrations.yml"
  workflow_dispatch:

jobs:
  push-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        id: validate
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping DB migration push because one or more required secrets are missing."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.validate.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        if: steps.validate.outputs.ready == 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply SQL migrations
        if: steps.validate.outputs.ready == 'true'
        run: |
          export PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
          export PGHOST="aws-1-us-east-1.pooler.supabase.com"
          export PGPORT="6543"
          export PGUSER="postgres.${{ secrets.SUPABASE_PROJECT_REF }}"
          export PGDATABASE="postgres"
          export PGSSLMODE="require"

          for migration in supabase/migrations/*.sql; do
            echo "Applying ${migration}"
            psql -v ON_ERROR_STOP=1 -f "$migration"
          done
