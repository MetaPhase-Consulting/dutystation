name: DB Migrations

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrations.yml"
  workflow_dispatch:

jobs:
  push-migrations:
    runs-on: ubuntu-latest
    if: ${{ secrets.SUPABASE_PROJECT_REF != '' && secrets.SUPABASE_DB_PASSWORD != '' && secrets.SUPABASE_ACCESS_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}" --include-all --yes
